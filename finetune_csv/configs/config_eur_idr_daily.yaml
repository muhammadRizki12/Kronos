# Template config for finetuning Kronos on EUR/IDR daily CSV data

data:
  data_path: '/kaggle/input/datasets/muhammadrizki34/euro-idr/eur_idr_kronos_kronos.csv'
  lookback_window: 90
  predict_window: 30
  max_context: 512
  clip: 5.0
  # dataset split ratio
  train_ratio: 0.9
  val_ratio: 0.1
  test_ratio: 0.0

training:
  # control the training epochs of tokenizer and basemodel
  tokenizer_epochs: 5
  basemodel_epochs: 5
  batch_size: 16
  log_interval: 50
  num_workers: 0
  seed: 42

  tokenizer_learning_rate: 0.0002
  predictor_learning_rate: 0.000001

  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_weight_decay: 0.1

  # gradient accumulation steps for tokenizer training
  accumulation_steps: 1

# model path configuration
model_paths:
  # pretrained model path
  pretrained_tokenizer: 'NeoQuasar/Kronos-Tokenizer-base'
  pretrained_predictor: 'NeoQuasar/Kronos-base'

  # experiment name - other paths will be generated based on this
  exp_name: 'eur_idr_daily'
  base_path: './../finetuned'

  # the following paths will be generated based on exp_name, no need to modify manually
  base_save_path: ''
  finetuned_tokenizer: ''

  tokenizer_save_name: 'tokenizer'
  basemodel_save_name: 'basemodel'

experiment:
  name: 'kronos_eur_idr_daily_finetune'
  description: 'Custom finetune for EUR/IDR daily CSV data'
  use_comet: false

  # control the training phase
  train_tokenizer: true
  train_basemodel: true

  # if true, skip the existing model training
  skip_existing: false

# device configuration
device:
  use_cuda: true
  device_id: 0
